<!DOCTYPE html>
<html lang="en" dir="ltr" data-nav-layout="vertical" data-vertical-style="overlay" data-theme-mode="light" data-header-styles="light" data-menu-styles="light" data-toggled="close">

<head>

    <!-- Meta Data -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title> noa - Bootstrap 5 Premium Admin &amp; Dashboard Template </title>
    <meta name="Description" content="Bootstrap Responsive Admin Web Dashboard HTML5 Template">

	<meta name="keywords" content="admin dashboard,admin template,admin,dashboard,bootstrap dashboard,bootstrap html template,dashboard template,bootstrap admin template,html admin template,dashboard html css,bootstrap admin,dashboard css,admin panel bootstrap,bootstrap dashboard template">

    <!-- Favicon -->
    <link rel="icon" href="../assets/images/brand-logos/favicon.ico" type="image/x-icon">

    <!-- Main Theme Js -->
    <script src="../assets/js/authentication-main.js"></script>

    <!-- Bootstrap Css -->
    <link id="style" href="../assets/libs/bootstrap/css/bootstrap.min.css" rel="stylesheet" >

    <!-- Style Css -->
    <link href="../assets/css/styles.min.css" rel="stylesheet" >

    <!-- Icons Css -->
    <link href="../assets/css/icons.min.css" rel="stylesheet" >


</head>

<body class="sign-in-basic-page">

    @SPK@include("partials/switcher.html")
    @SPK@include("partials/loader.html")

    <div class="container-lg">
        <div class="row justify-content-center authentication authentication-basic align-items-center h-100">
            <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-6 col-sm-8 col-12">
                <div class="my-4 d-flex justify-content-center">
                    <a href="index.html">
                        <img src="../assets/images/brand-logos/desktop-dark.png" alt="logo" class="">
                    </a>
                </div>
                <div class="card custom-card">
                    <div class="card-body p-4 pb-3">
                        <h4 class="fw-semibold mb-4 text-center">Create Password</h4>
                        <div class="row gy-3">
                            <div class="col-xl-12">
                                <label for="create-password" class="form-label text-default">Password</label>
                                <div class="input-group input-box">
                                    <input type="password" class="form-control form-control-lg" id="create-password" placeholder="password">
                                    <span class="authentication-input-icon"><i class="ri-lock-2-fill text-default fs-15 op-7"></i></span>
                                    <button aria-label="button" class="btn btn-light" type="button" onclick="createpassword('create-password',this)"><i class="ri-eye-off-line align-middle"></i></button>
                                </div>
                            </div>
                            <div class="col-xl-12 mb-2">
                                <label for="create-confirmpassword" class="form-label text-default">Confirm Password</label>
                                <div class="input-group input-box">
                                    <input type="password" class="form-control form-control-lg" id="create-confirmpassword" placeholder="password">
                                    <span class="authentication-input-icon"><i class="ri-lock-2-fill text-default fs-15 op-7"></i></span>
                                    <button aria-label="button" class="btn btn-light" onclick="createpassword('create-confirmpassword',this)" type="button"><i class="ri-eye-off-line align-middle"></i></button>
                                </div>
                                <div class="mt-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="" id="defaultCheck1">
                                        <label class="form-check-label text-muted fw-normal" for="defaultCheck1">
                                            Remember password ?
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-12 d-grid mt-2">
                                <button type="button" class="btn btn-lg btn-primary">Save Password</button>
                            </div>
                        </div>
                        <div class="text-center">
                            <p class="fs-12 text-muted mt-3 mb-0">Back to home ? <a href="index.html" class="text-primary">Click Here</a></p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="btn-list text-center">
                            <button aria-label="button" type="button" class="btn btn-icon btn-light">
                                <i class="ri-google-line fw-bold text-dark op-7 align-middle"></i>
                            </button>
                            <button aria-label="button" type="button" class="btn btn-icon btn-light">
                                <i class="ri-facebook-line fw-bold text-dark op-7 align-middle"></i>
                            </button>
                            <button aria-label="button" type="button" class="btn btn-icon btn-light">
                                <i class="ri-twitter-line fw-bold text-dark op-7 align-middle"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="../assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/custom-switcher.min.js"></script>

    <!-- Show Password JS -->
    <script src="../assets/js/show-password.js"></script>

</body>

</html>
